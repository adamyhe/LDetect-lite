[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ldetect2"
version = "0.1.0"
description = "Modern reimplementation of ldetect: approximately independent LD blocks in the human genome"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [
    { name = "Original algorithm: Tomaz Berisa, Joe Pickrell" },
]
keywords = ["bioinformatics", "LD", "linkage-disequilibrium", "GWAS"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "numba>=0.57",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff",
    "mypy",
]

[project.scripts]
ldetect2 = "ldetect2._cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ldetect2"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: slow end-to-end tests against example data (deselect with -m 'not integration')",
]

[tool.ruff]
src = ["src"]
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.10"
strict = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
]
